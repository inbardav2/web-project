</head>

<body>

    <header>

            <a href="tip-water.html">Water Tips |</a>

        <section class="progress-section">
            <h3>Your Progress</h3>

            <div class="progress-bar">
                <div id="progress"></div>
            </div>

            <p id="status"></p>
        </section>

    <footer>
        <p>Eco Life ©</p>
